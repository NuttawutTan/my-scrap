name: Weekly XD Calendar Scraper

on:
  schedule:
    - cron: '0 1 * * 1'  # ทุกวันจันทร์ 01:00 UTC (08:00 น. เวลาไทย)
  workflow_dispatch:      # รันด้วยมือได้จาก GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64

      - name: Run scraper
        run: node index.js

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: dividend-data-${{ github.run_number }}
          path: dividend.json
          retention-days: 90
